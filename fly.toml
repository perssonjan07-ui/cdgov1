app = "cdgov1"
primary_region = "arn"

[build]
  image = "docker.io/library/nginx:alpine"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Fly.io:s officiella sätt att skicka med startkommandon utan att krascha valideringen
[experimental]
  exec = ["nginx", "-g", "daemon off;"]
