app = 'cdgov1'
primary_region = 'ams'

[experimental]
  exec = ['nginx', '-g', 'daemon off;']

[build]
  image = 'docker.io/library/nginx:alpine'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
